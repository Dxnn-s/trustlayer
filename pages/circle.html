<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>My Trusted Circle</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&family=Public+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed-dim": "#4edea3",
              "inverse-surface": "#27313f",
              "surface-container-highest": "#d9e3f6",
              "on-tertiary-fixed-variant": "#842225",
              "on-error": "#ffffff",
              "outline": "#6c7a71",
              "tertiary-container": "#fc7c78",
              "tertiary": "#a43a3a",
              "primary": "#006c49",
              "surface-variant": "#d9e3f6",
              "primary-container": "#10b981",
              "tertiary-fixed": "#ffdad7",
              "on-error-container": "#93000a",
              "on-tertiary-container": "#711419",
              "primary-fixed": "#6ffbbe",
              "secondary": "#376850",
              "on-primary-fixed-variant": "#005236",
              "on-tertiary": "#ffffff",
              "inverse-primary": "#4edea3",
              "on-secondary-fixed": "#002113",
              "error": "#ba1a1a",
              "on-secondary-fixed-variant": "#1e4f3a",
              "on-primary-container": "#00422b",
              "surface-dim": "#d0dbed",
              "on-tertiary-fixed": "#410005",
              "on-surface": "#121c2a",
              "secondary-fixed": "#baeed1",
              "on-primary": "#ffffff",
              "error-container": "#ffdad6",
              "surface-container-low": "#eff4ff",
              "on-secondary": "#ffffff",
              "tertiary-fixed-dim": "#ffb3af",
              "surface-container-lowest": "#ffffff",
              "surface-container": "#e6eeff",
              "on-surface-variant": "#3c4a42",
              "background": "#f8f9ff",
              "outline-variant": "#bbcabf",
              "on-secondary-container": "#3c6c54",
              "surface-tint": "#006c49",
              "surface": "#f8f9ff",
              "secondary-fixed-dim": "#9ed2b5",
              "secondary-container": "#b7ebce",
              "on-background": "#121c2a",
              "surface-bright": "#f8f9ff",
              "on-primary-fixed": "#002113",
              "surface-container-high": "#dee9fc",
              "inverse-on-surface": "#eaf1ff"
            },
            fontFamily: {
              "headline": ["Lexend"],
              "body": ["Public Sans"],
              "label": ["Public Sans"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      body { font-family: 'Public Sans', sans-serif; min-height: max(884px, 100dvh); }
      h1, h2, h3 { font-family: 'Lexend', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<header class="bg-[#f8f9ff] flex items-center justify-between px-6 py-4 w-full top-0 z-50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="shield">shield</span>
<span class="text-primary font-['Lexend'] font-bold text-lg tracking-tight">TrustLayer</span>
</div>
<div class="hidden md:flex gap-6">
<span class="text-on-surface-variant font-label font-bold text-sm cursor-pointer hover:text-primary transition-colors">Dashboard</span>
<span class="text-primary font-label font-bold text-sm cursor-pointer">Circle</span>
<span class="text-on-surface-variant font-label font-bold text-sm cursor-pointer hover:text-primary transition-colors">History</span>
</div>
</header>
<main class="flex-1 max-w-2xl mx-auto w-full px-6 pt-8 pb-32">
<div class="flex items-center justify-between mb-8">
<h1 class="text-3xl font-black tracking-tight text-on-surface">My trusted circle</h1>
<div id="circle-count" class="bg-primary-container text-on-primary-container px-3 py-1 rounded-full font-headline font-bold text-sm">0/10</div>
</div>
<p class="text-on-surface-variant mb-10 leading-relaxed font-body">
  Manage the people you trust to verify your identity. Only members of your circle can vouch for your secure transactions.
</p>
<div id="contacts-list" class="space-y-0 bg-surface-container-lowest rounded-xl overflow-hidden">
<p class="p-5 text-on-surface-variant text-sm">Loading...</p>
</div>

<!-- Add contact form (hidden by default) -->
<div id="add-form" style="display:none" class="mt-6 bg-surface-container-low rounded-xl p-5 space-y-4">
  <p id="add-error" style="display:none;color:#ba1a1a;font-size:0.875rem;font-weight:600"></p>
  <div>
    <label class="font-label font-bold text-xs uppercase tracking-widest text-on-surface-variant block mb-2">Name</label>
    <input id="add-name" placeholder="Almaz" class="w-full bg-surface-container-high rounded-xl px-4 py-3 font-body border-none focus:ring-2 focus:ring-primary outline-none" />
  </div>
  <div>
    <label class="font-label font-bold text-xs uppercase tracking-widest text-on-surface-variant block mb-2">Phone</label>
    <input id="add-phone" placeholder="+251922000000" class="w-full bg-surface-container-high rounded-xl px-4 py-3 font-body border-none focus:ring-2 focus:ring-primary outline-none" />
  </div>
  <div class="flex gap-3">
    <button id="add-confirm-btn" class="flex-1 bg-primary-container text-on-primary-container font-headline font-bold py-3 rounded-xl active:scale-95 transition-transform">Add</button>
    <button id="add-cancel-btn" class="flex-1 border-2 border-outline-variant text-on-surface-variant font-headline font-bold py-3 rounded-xl active:scale-95 transition-transform">Cancel</button>
  </div>
</div>

<div id="add-btn-wrap" class="mt-12 flex justify-center">
<button id="add-btn" class="bg-primary-container text-on-primary-container font-headline font-bold py-4 px-10 rounded-full flex items-center gap-3 active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined font-black" data-icon="add">add</span>
<span>Add contact</span>
</button>
</div>
</main>
<nav class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-2 bg-white border-t-4 border-[#eff4ff] z-50">
<a href="/pages/verify.html" class="flex flex-col items-center justify-center text-[#121c2a] p-2 hover:opacity-80">
<span class="material-symbols-outlined text-2xl" data-icon="verified_user">verified_user</span>
<span class="font-['Lexend'] font-bold text-[10px] uppercase tracking-widest mt-1">Verify</span>
</a>
<a href="/pages/circle.html" class="flex flex-col items-center justify-center bg-[#10b981] text-white rounded-xl p-2 scale-105">
<span class="material-symbols-outlined text-2xl" data-icon="group" style="font-variation-settings: 'FILL' 1;">group</span>
<span class="font-['Lexend'] font-bold text-[10px] uppercase tracking-widest mt-1">Circle</span>
</a>
<a href="/pages/history.html" class="flex flex-col items-center justify-center text-[#121c2a] p-2 hover:opacity-80">
<span class="material-symbols-outlined text-2xl" data-icon="history">history</span>
<span class="font-['Lexend'] font-bold text-[10px] uppercase tracking-widest mt-1">History</span>
</a>
<a href="/pages/profile.html" class="flex flex-col items-center justify-center text-[#121c2a] p-2 hover:opacity-80">
<span class="material-symbols-outlined text-2xl" data-icon="person">person</span>
<span class="font-['Lexend'] font-bold text-[10px] uppercase tracking-widest mt-1">Profile</span>
</a>
</nav>
<script>
(function () {
  function toast(msg) {
    var t = document.createElement('div');
    t.textContent = msg;
    t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#121c2a;color:#fff;padding:0.55rem 1.1rem;border-radius:0.5rem;font-size:0.82rem;font-family:Lexend,sans-serif;z-index:9999;opacity:0;transition:opacity 0.2s;white-space:nowrap;pointer-events:none';
    document.body.appendChild(t);
    setTimeout(function () { t.style.opacity = '1'; }, 10);
    setTimeout(function () { t.style.opacity = '0'; setTimeout(function () { t.remove(); }, 300); }, 2600);
  }

  var USER_ID = '+251912345678';
  var list      = document.getElementById('contacts-list');
  var countBadge= document.getElementById('circle-count');
  var addBtn    = document.getElementById('add-btn');
  var addBtnWrap= document.getElementById('add-btn-wrap');
  var addForm   = document.getElementById('add-form');
  var addError  = document.getElementById('add-error');
  var addPhone  = document.getElementById('add-phone');
  var addName   = document.getElementById('add-name');
  var confirmBtn= document.getElementById('add-confirm-btn');
  var cancelBtn = document.getElementById('add-cancel-btn');

  function renderContacts(contacts) {
    countBadge.textContent = contacts.length + '/10';
    if (contacts.length === 0) {
      list.innerHTML = '<p class="p-5 text-on-surface-variant text-sm">No contacts yet. Add someone below.</p>';
      return;
    }
    list.innerHTML = contacts.map(function (c, i) {
      var border = i < contacts.length - 1 ? 'border-b border-surface-container' : '';
      return '<div class="flex items-center justify-between p-5 transition-colors duration-200 hover:bg-surface-container-low ' + border + '">' +
        '<div class="flex items-center gap-4">' +
          '<div class="w-3 h-3 rounded-full bg-primary-container"></div>' +
          '<div>' +
            '<div class="font-headline font-bold text-on-surface">' + (c.name || '<em style="color:#6c7a71">No name</em>') + '</div>' +
            '<div class="font-body text-sm text-on-surface-variant tracking-wider">' + c.phone + '</div>' +
          '</div>' +
        '</div>' +
        '<button data-phone="' + c.phone + '" aria-label="Remove" class="remove-btn text-outline-variant hover:text-error transition-colors p-2">' +
          '<span class="material-symbols-outlined text-xl">close</span>' +
        '</button>' +
      '</div>';
    }).join('');

    list.querySelectorAll('.remove-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        removeContact(this.dataset.phone);
      });
    });
  }

  async function loadContacts() {
    try {
      var res = await fetch('/api/circle/' + encodeURIComponent(USER_ID));
      var data = await res.json();
      renderContacts(data.contacts);
    } catch (e) {
      list.innerHTML = '<p class="p-5 text-on-surface-variant text-sm">Could not load contacts. Is the server running?</p>';
    }
  }

  async function removeContact(phone) {
    var res = await fetch('/api/circle/' + encodeURIComponent(USER_ID) + '/' + encodeURIComponent(phone), { method: 'DELETE' });
    var data = await res.json();
    renderContacts(data.contacts);
  }

  addBtn.addEventListener('click', function () {
    addForm.style.display = 'block';
    addBtnWrap.style.display = 'none';
    addError.style.display = 'none';
    addPhone.value = '';
    addName.value = '';
  });

  cancelBtn.addEventListener('click', function () {
    addForm.style.display = 'none';
    addBtnWrap.style.display = 'flex';
  });

  // Only allow + and digits in phone field
  addPhone.addEventListener('input', function () {
    this.value = this.value.replace(/[^\d+]/g, '');
    addError.style.display = 'none';
  });

  confirmBtn.addEventListener('click', async function () {
    addError.style.display = 'none';
    var phone = addPhone.value.trim();
    var name  = addName.value.trim();

    if (!phone) {
      addError.textContent = 'Phone number is required.';
      addError.style.display = 'block';
      addPhone.focus();
      return;
    }
    var digits = phone.replace(/^\+/, '');
    if (!/^\d{9,12}$/.test(digits)) {
      addError.textContent = 'Enter a valid phone number (e.g. +251911223344).';
      addError.style.display = 'block';
      addPhone.focus();
      return;
    }

    confirmBtn.textContent = 'Adding...';
    confirmBtn.disabled = true;
    try {
      var res = await fetch('/api/circle/' + encodeURIComponent(USER_ID), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone: phone, name: name })
      });
      var data = await res.json();
      if (!res.ok) {
        addError.textContent = data.error;
        addError.style.display = 'block';
        return;
      }
      renderContacts(data.contacts);
      addForm.style.display = 'none';
      addBtnWrap.style.display = 'flex';
    } catch (e) {
      addError.textContent = 'Connection error.';
      addError.style.display = 'block';
    } finally {
      confirmBtn.textContent = 'Add';
      confirmBtn.disabled = false;
    }
  });

  loadContacts();
})();
</script>
</body></html>
