<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Search Agents – TrustLayer</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;800;900&family=Public+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#006c49", "primary-container": "#10b981",
          "on-primary-container": "#00422b", "on-primary": "#ffffff",
          "surface": "#f8f9ff", "surface-container-lowest": "#ffffff",
          "surface-container-low": "#eff4ff", "surface-container": "#e6eeff",
          "surface-container-high": "#dee9fc", "surface-container-highest": "#d9e3f6",
          "on-surface": "#121c2a", "on-surface-variant": "#3c4a42",
          "outline": "#6c7a71", "outline-variant": "#bbcabf",
          "error": "#ba1a1a", "background": "#f8f9ff",
        },
        fontFamily: { "headline": ["Lexend"], "body": ["Public Sans"], "label": ["Public Sans"] },
        borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
      },
    },
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { font-family: 'Public Sans', sans-serif; min-height: max(884px, 100dvh); }
  h1, h2, h3 { font-family: 'Lexend', sans-serif; }
</style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">

<header class="bg-[#f8f9ff] sticky top-0 z-40 flex items-center gap-3 px-6 py-4">
  <button onclick="history.back()" class="p-2 rounded-full hover:bg-surface-container transition-colors">
    <span class="material-symbols-outlined">arrow_back</span>
  </button>
  <div class="flex items-center gap-3 flex-1">
    <span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings:'FILL' 1">shield</span>
    <span class="font-headline font-bold text-xl text-primary tracking-tight">TrustLayer</span>
  </div>
</header>

<main class="flex-1 max-w-2xl mx-auto w-full px-6 pt-8 pb-32">
  <div class="mb-8">
    <h1 class="font-headline text-3xl font-bold mb-2">Search Agents</h1>
    <p class="text-on-surface-variant font-body text-sm">Find verified agents by name, phone, ID, region, or kebele.</p>
  </div>

  <div class="flex items-center bg-surface-container-high rounded-xl px-4 py-3 gap-3 mb-6">
    <span class="material-symbols-outlined text-on-surface-variant">search</span>
    <input
      id="search-input"
      type="search"
      placeholder="Search by name, phone, region…"
      class="flex-1 bg-transparent border-none focus:ring-0 font-body text-base placeholder:text-outline-variant outline-none"
      autocomplete="off"
    />
    <button id="search-clear" style="display:none" class="text-on-surface-variant hover:text-on-surface">
      <span class="material-symbols-outlined text-base">close</span>
    </button>
  </div>

  <div id="results" class="space-y-3">
    <div class="text-center py-12 text-on-surface-variant">
      <span class="material-symbols-outlined text-5xl block mb-3">manage_search</span>
      <p class="font-body text-sm">Type to search the agent registry.</p>
    </div>
  </div>
</main>

<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white border-t border-outline-variant">
  <a href="/pages/verify.html" class="flex flex-col items-center justify-center text-[#1f2937] px-4 py-1 hover:opacity-80">
    <span class="material-symbols-outlined">verified_user</span>
    <span class="font-headline text-[12px] font-medium">Verify</span>
  </a>
  <a href="/pages/circle.html" class="flex flex-col items-center justify-center text-[#1f2937] px-4 py-1 hover:opacity-80">
    <span class="material-symbols-outlined">group</span>
    <span class="font-headline text-[12px] font-medium">Circle</span>
  </a>
  <a href="/pages/history.html" class="flex flex-col items-center justify-center text-[#1f2937] px-4 py-1 hover:opacity-80">
    <span class="material-symbols-outlined">history</span>
    <span class="font-headline text-[12px] font-medium">History</span>
  </a>
  <a href="/pages/scam-warning.html" class="flex flex-col items-center justify-center text-[#1f2937] px-4 py-1 hover:opacity-80">
    <span class="material-symbols-outlined">security</span>
    <span class="font-headline text-[12px] font-medium">Safety</span>
  </a>
  <a href="/pages/profile.html" class="flex flex-col items-center justify-center text-[#1f2937] px-4 py-1 hover:opacity-80">
    <span class="material-symbols-outlined">person</span>
    <span class="font-headline text-[12px] font-medium">Profile</span>
  </a>
</nav>

<script>
(function () {
  var input   = document.getElementById('search-input');
  var results = document.getElementById('results');
  var clearBtn= document.getElementById('search-clear');
  var debounceTimer;

  function badgeHtml(a) {
    if (a.verified) return '<span class="text-xs font-bold px-2 py-0.5 rounded-full" style="background:#dcfce7;color:#166534">Verified</span>';
    return '<span class="text-xs font-bold px-2 py-0.5 rounded-full" style="background:#fef9c3;color:#854d0e">Low Trust</span>';
  }

  function renderResults(arr) {
    if (!arr.length) {
      results.innerHTML = '<div class="text-center py-12 text-on-surface-variant"><span class="material-symbols-outlined text-5xl block mb-3">search_off</span><p class="font-body text-sm">No agents found.</p></div>';
      return;
    }
    results.innerHTML = arr.map(function (a) {
      var score = (a.trust_score * 5).toFixed(2);
      return '<div class="bg-surface-container-lowest rounded-xl p-4 flex items-center gap-4 border border-outline-variant">' +
        '<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center flex-shrink-0">' +
          '<span class="material-symbols-outlined text-on-primary-container" style="font-variation-settings:\'FILL\' 1">person</span>' +
        '</div>' +
        '<div class="flex-1 min-w-0">' +
          '<div class="font-headline font-bold text-on-surface">' + a.name + '</div>' +
          '<div class="text-xs text-on-surface-variant">' + a.phone + ' · ' + a.region + (a.kebele ? ' · ' + a.kebele : '') + '</div>' +
          '<div class="text-xs text-on-surface-variant">ID: ' + a.id + ' · Score: ' + score + '/5</div>' +
        '</div>' +
        '<div>' + badgeHtml(a) + '</div>' +
      '</div>';
    }).join('');
  }

  async function doSearch(q) {
    if (!q.trim()) {
      results.innerHTML = '<div class="text-center py-12 text-on-surface-variant"><span class="material-symbols-outlined text-5xl block mb-3">manage_search</span><p class="font-body text-sm">Type to search the agent registry.</p></div>';
      return;
    }
    try {
      var res  = await fetch('/api/search?q=' + encodeURIComponent(q));
      var data = await res.json();
      renderResults(data.results || []);
    } catch (e) {
      results.innerHTML = '<p class="text-on-surface-variant text-sm p-4">Search failed. Is the server running?</p>';
    }
  }

  input.addEventListener('input', function () {
    var val = this.value;
    clearBtn.style.display = val ? 'block' : 'none';
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function () { doSearch(val); }, 280);
  });

  clearBtn.addEventListener('click', function () {
    input.value = '';
    clearBtn.style.display = 'none';
    doSearch('');
    input.focus();
  });
})();
</script>
</body>
</html>
